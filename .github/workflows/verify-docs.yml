name: Verify Docs (Reusable)

on:
  workflow_call:

permissions:
  contents: read

jobs:
  verify-docs:
    name: Verify Docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.4'
          cache: false

      - name: Cache Go modules and build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            !~/go/pkg/mod/golang.org/toolchain*
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.3.3

      - name: Verify docs are up-to-date
        run: |
          # re-generate the docs
          make generate
          # if any diffs then fail the build
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "ERROR: docs are not up-to-date, failing build" && exit 1;
          else
            echo "INFO: docs are up-to-date"
          fi
