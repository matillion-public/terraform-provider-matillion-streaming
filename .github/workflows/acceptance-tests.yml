name: Acceptance Tests (Reusable)

on:
  workflow_call:
    inputs:
      region:
        description: 'Region to run tests against (us or eu)'
        required: true
        type: string
    secrets:
      MATILLION_ACCOUNT_ID:
        required: true
      MATILLION_CLIENT_ID:
        required: true
      MATILLION_CLIENT_SECRET:
        required: true
      MATILLION_PROJECT_ID:
        required: true
      MATILLION_AGENT_ID:
        required: true

permissions:
  contents: read

jobs:
  acceptance-tests:
    name: Acceptance Tests - ${{ inputs.region }}
    runs-on: ubuntu-latest
    env:
      MATILLION_ACCOUNT_ID: ${{ secrets.MATILLION_ACCOUNT_ID }}
      MATILLION_CLIENT_ID: ${{ secrets.MATILLION_CLIENT_ID }}
      MATILLION_CLIENT_SECRET: ${{ secrets.MATILLION_CLIENT_SECRET }}
      MATILLION_PROJECT_ID: ${{ secrets.MATILLION_PROJECT_ID }}
      MATILLION_AGENT_ID: ${{ secrets.MATILLION_AGENT_ID }}
      MATILLION_REGION: ${{ inputs.region }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: '1.25.4'
          cache: false

      - name: Cache Go modules and build cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            ~/go/pkg/mod
            !~/go/pkg/mod/golang.org/toolchain*
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Set unique test run ID
        run: |
          # Use first 8 chars of GitHub run ID for test isolation
          echo "TEST_RUN_ID=$(echo ${{ github.run_id }} | cut -c1-8)" >> $GITHUB_ENV
          echo "Test Run ID: ${TEST_RUN_ID}"

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@v1.13.0

      - name: Run acceptance tests
        id: run-acceptance-tests
        run: |
          echo "Running tests with TEST_RUN_ID: ${TEST_RUN_ID}"
          TF_ACC=1 gotestsum --junitfile acceptance-tests-${{ inputs.region }}.xml -- -v -cover -timeout 120m ./...

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: acceptance-tests-${{ inputs.region }}
          path: acceptance-tests-${{ inputs.region }}.xml

      - name: Run sweepers to clean up test resources
        if: always() && steps.run-acceptance-tests.outcome != 'skipped'
        run: |
          echo "Running sweepers with TEST_RUN_ID: ${TEST_RUN_ID}"
          TF_ACC=1 go test ./internal/provider -v -sweep=${{ inputs.region }} -timeout 30m
